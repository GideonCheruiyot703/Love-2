<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500&family=Quicksand:wght@400;500&display=swap');

  :root{
    --plum: #3b2540;
    --rose: #e8a3b0;
    --gold: #d9b97c;
    --cream: #fdf6f0;
    --deep: #271621;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html, body{
    height:100%;
    background: radial-gradient(ellipse at 50% 30%, #4a2f4f 0%, var(--deep) 70%);
    overflow:hidden;
    font-family:'Quicksand', sans-serif;
  }

  .stage{
    position:relative;
    width:100%;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  canvas#hearts{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    pointer-events:none;
  }

  .glow{
    position:absolute;
    width:60vmax;
    height:60vmax;
    border-radius:50%;
    background: radial-gradient(circle, rgba(232,163,176,0.18) 0%, rgba(232,163,176,0) 70%);
    animation: breathe 6s ease-in-out infinite;
    pointer-events:none;
  }

  @keyframes breathe{
    0%,100%{ transform:scale(1); opacity:0.8; }
    50%{ transform:scale(1.12); opacity:1; }
  }

  .content{
    position:relative;
    z-index:3;
    text-align:center;
    padding:0 8vw;
    max-width:780px;
  }

  .eyebrow{
    font-size:0.78rem;
    letter-spacing:0.35em;
    text-transform:uppercase;
    color:var(--gold);
    opacity:0;
    animation: fadeUp 1.2s ease forwards 0.3s;
  }

  .quote{
    margin-top:1.4rem;
    font-family:'Cormorant Garamond', serif;
    font-weight:500;
    font-style:italic;
    color:var(--cream);
    font-size:clamp(1.8rem, 5vw, 3.4rem);
    line-height:1.35;
    letter-spacing:0.01em;
  }

  .quote .word{
    display:inline-block;
    opacity:0;
    filter: blur(6px);
    transform: translateY(14px);
    animation: reveal 1.1s cubic-bezier(.2,.7,.2,1) forwards;
  }

  @keyframes reveal{
    to{ opacity:1; filter:blur(0); transform:translateY(0); }
  }

  @keyframes fadeUp{
    to{ opacity:1; }
  }

  .signature{
    margin-top:2.4rem;
    font-size:0.95rem;
    color:var(--rose);
    letter-spacing:0.06em;
    opacity:0;
    animation: fadeUp 1.4s ease forwards 3.4s;
  }

  .heart-mark{
    margin-top:1.6rem;
    width:34px;
    height:30px;
    margin-inline:auto;
    opacity:0;
    animation: fadeUp 1s ease forwards 3.7s, pulse 1.6s ease-in-out infinite 4.7s;
  }
  .heart-mark svg{ width:100%; height:100%; display:block; }
  .heart-mark path{ fill:var(--rose); }

  @keyframes pulse{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.15); }
  }

  @media (prefers-reduced-motion: reduce){
    .quote .word{ animation:none; opacity:1; filter:none; transform:none; }
    .eyebrow, .signature, .heart-mark{ animation:none; opacity:1; }
    .glow{ animation:none; }
  }
</style>
</head>
<body>
<div class="stage">
  <div class="glow"></div>
  <canvas id="hearts"></canvas>

  <div class="content">
    <div class="eyebrow">for the one i love</div>
    <p class="quote" id="quote"></p>
    <div class="heart-mark">
      <svg viewBox="0 0 100 90"><path d="M50,88.9C25.5,78.2,0.5,54.4,3.8,31.1S41.3,1.8,50,29.9c8.7-28.2,42.8-22.2,46.2,1.2S74.5,78.2,50,88.9z"/></svg>
    </div>
    <div class="signature">— here for you, always</div>
  </div>
</div>

<script>
  // Type the quote word by word with staggered reveal
  const text = "Of all the hearts I've wandered past, yours is the one I want to protect — gently, always, no matter what.";
  const quoteEl = document.getElementById('quote');
  const words = text.split(' ');
  words.forEach((w, i) => {
    const span = document.createElement('span');
    span.className = 'word';
    span.style.animationDelay = (0.6 + i * 0.13) + 's';
    span.textContent = w + (i < words.length - 1 ? '\u00A0' : '');
    quoteEl.appendChild(span);
  });

  // Floating hearts on canvas
  const canvas = document.getElementById('hearts');
  const ctx = canvas.getContext('2d');
  let w, h;
  function resize(){
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function drawHeart(x, y, size, alpha, hue){
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(size/20, size/20);
    ctx.beginPath();
    ctx.moveTo(0, 6);
    ctx.bezierCurveTo(-10, -6, -20, 4, 0, 16);
    ctx.bezierCurveTo(20, 4, 10, -6, 0, 6);
    ctx.closePath();
    ctx.fillStyle = `hsla(${hue}, 70%, ${78}%, ${alpha})`;
    ctx.fill();
    ctx.restore();
  }

  class Heart{
    constructor(){ this.reset(true); }
    reset(initial){
      this.x = Math.random() * w;
      this.y = initial ? Math.random() * h : h + 30 + Math.random()*60;
      this.size = 6 + Math.random() * 14;
      this.speed = 0.25 + Math.random() * 0.5;
      this.drift = (Math.random() - 0.5) * 0.6;
      this.alpha = 0.15 + Math.random() * 0.4;
      this.hue = 330 + Math.random()*30; // pink/rose range
      this.sway = Math.random()*Math.PI*2;
    }
    update(){
      this.y -= this.speed;
      this.x += Math.sin(this.sway) * 0.3;
      this.sway += 0.01;
      if(this.y < -30) this.reset(false);
    }
    draw(){
      drawHeart(this.x, this.y, this.size, this.alpha, this.hue);
    }
  }

  const hearts = Array.from({length: 38}, () => new Heart());

  function animate(){
    ctx.clearRect(0,0,w,h);
    hearts.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(animate);
  }
  animate();
</script>
</body>
</html>
